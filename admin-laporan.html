<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<title>Admin Dashboard</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

<style>
body{font-family:sans-serif;background:#f5f5f5;padding:20px;}
table{width:100%;border-collapse:collapse;background:white;}
th,td{padding:10px;border:1px solid #ddd;text-align:left;}
img{width:70px;margin:3px;border-radius:6px;}
</style>
</head>

<body>

<h2>📊 Admin Serah Terima Obat</h2>

<table>
<thead>
<tr>
<th>No</th>
<th>Waktu</th>
<th>Shift</th>
<th>Pengirim</th>
<th>Penerima</th>
<th>Pasien</th>
<th>URN</th>
<th>Lantai</th>
<th>Obat</th>
<th>Foto</th>
</tr>
</thead>

<tbody id="data"></tbody>
</table>

<script>
const supabase = window.supabase.createClient(
  'https://wgxtnhgjrkgigyqhnlwy.supabase.co',
   'sb_publishable_XXXX'
);

async function loadData(){
  const { data, error } = await supabase
    .from('handover_data')
    .select('*')
    .order('timestamp', { ascending: false });

  if(error){
    alert(error.message);
    return;
  }

  let html = "";

  data.forEach((d,i)=>{
    let images = "";

    if(d.foto_url){
      d.foto_url.split(",").forEach(url=>{
        images += `<img src="${url}">`;
      });
    }

    html += `
    <tr>
      <td>${i+1}</td>
      <td>${new Date(d.timestamp).toLocaleString()}</td>
      <td>${d.shift}</td>
      <td>${d.pengirim}</td>
      <td>${d.penerima}</td>
      <td>${d.nama_pasien}</td>
      <td>${d.urn_pasien}</td>
      <td>${d.lantai}</td>
      <td>${d.nama_obat}</td>
      <td>${images}</td>
    </tr>
    `;
  });

  document.getElementById('data').innerHTML = html;
}

loadData();
</script>

</body>
</html>
