<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<title>Admin Dashboard</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

<style>
body{
  font-family:'Segoe UI';
  background:#1e1e2f;
  color:white;
  padding:20px;
}

.container{
  background:#2a2a40;
  padding:20px;
  border-radius:12px;
}

h2{margin-bottom:5px;}

#clock{
  margin-bottom:15px;
  color:#bbb;
}

table{
  width:100%;
  border-collapse:collapse;
}

th{
  background:#5c6bc0;
}

th,td{
  padding:10px;
  border:1px solid #444;
}

tr:nth-child(even){
  background:#25253a;
}

img{width:60px;border-radius:6px;}
</style>
</head>

<body>

<div class="container">
<h2>📊 Admin Serah Terima</h2>
<div id="clock"></div>

<table>
<thead>
<tr>
<th>No</th>
<th>Waktu</th>
<th>Shift</th>
<th>Pengirim</th>
<th>Penerima</th>
<th>Pasien</th>
<th>URN</th>
<th>Lantai</th>
<th>Obat</th>
<th>Foto</th>
</tr>
</thead>

<tbody id="data"></tbody>
</table>
</div>

<script>
const supabase = window.supabase.createClient(
  'https://wgxtnhgjrkgigyqhnlwy.supabase.co',
  'sb_publishable_xxxxx'
);

function updateClock(){
  clock.innerText=new Date().toLocaleString();
}
setInterval(updateClock,1000);
updateClock();

async function loadData(){
  const {data,error}=await supabase
  .from('handover_data')
  .select('*')
  .order('timestamp',{ascending:false});

  if(error){alert(error.message);return;}

  let html="";

  data.forEach((d,i)=>{
    let imgs="";
    if(d.foto_url){
      d.foto_url.split(",").forEach(u=>{
        imgs+=`<img src="${u}">`;
      });
    }

    html+=`
    <tr>
      <td>${i+1}</td>
      <td>${new Date(d.timestamp).toLocaleString()}</td>
      <td>${d.shift}</td>
      <td>${d.pengirim}</td>
      <td>${d.penerima}</td>
      <td>${d.nama_pasien}</td>
      <td>${d.urn_pasien}</td>
      <td>${d.lantai}</td>
      <td>${d.nama_obat}</td>
      <td>${imgs}</td>
    </tr>`;
  });

  document.getElementById('data').innerHTML=html;
}

/* REALTIME */
supabase.channel('realtime')
.on('postgres_changes',{event:'*',schema:'public',table:'handover_data'},loadData)
.subscribe();

loadData();
</script>

</body>
</html>
