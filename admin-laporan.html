<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin - Laporan Serah Terima Obat</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            overflow: hidden;
        }

        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 30px 20px;
            text-align: center;
        }

        .header h1 {
            font-size: 28px;
            margin-bottom: 10px;
        }

        .content {
            padding: 30px 20px;
        }

        .controls {
            display: flex;
            gap: 15px;
            margin-bottom: 25px;
            flex-wrap: wrap;
        }

        .control-group {
            flex: 1;
            min-width: 200px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            color: #333;
            font-weight: 600;
            font-size: 14px;
        }

        input[type="date"],
        select {
            width: 100%;
            padding: 12px 15px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-size: 14px;
            transition: all 0.3s;
            font-family: inherit;
        }

        .btn {
            padding: 12px 25px;
            border: none;
            border-radius: 10px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }

        .btn-primary {
            background: #667eea;
            color: white;
        }

        .btn-primary:hover {
            background: #5568d3;
            transform: translateY(-2px);
        }

        .btn-success {
            background: #28a745;
            color: white;
        }

        .btn-success:hover {
            background: #218838;
            transform: translateY(-2px);
        }

        .btn-danger {
            background: #dc3545;
            color: white;
        }

        .btn-danger:hover {
            background: #c82333;
            transform: translateY(-2px);
        }

        .btn:disabled {
            background: #ccc;
            cursor: not-allowed;
            transform: none;
        }

        .stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .stat-card {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 20px;
            border-radius: 15px;
            text-align: center;
        }

        .stat-card h3 {
            font-size: 36px;
            margin-bottom: 10px;
        }

        .stat-card p {
            font-size: 14px;
            opacity: 0.9;
        }

        .data-table {
            overflow-x: auto;
            margin-bottom: 20px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            background: white;
        }

        th {
            background: #f8f9fa;
            padding: 15px;
            text-align: left;
            font-weight: 600;
            border-bottom: 2px solid #dee2e6;
            position: sticky;
            top: 0;
        }

        td {
            padding: 15px;
            border-bottom: 1px solid #dee2e6;
        }

        tr:hover {
            background: #f8f9fa;
        }

        .photo-preview {
            width: 80px;
            height: 80px;
            object-fit: cover;
            border-radius: 8px;
            cursor: pointer;
            border: 2px solid #e0e0e0;
        }

        .photo-preview:hover {
            border-color: #667eea;
            transform: scale(1.05);
            transition: all 0.3s;
        }

        .modal {
            display: none;
            position: fixed;
            z-index: 1000;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.9);
            justify-content: center;
            align-items: center;
        }

        .modal.active {
            display: flex;
        }

        .modal-content {
            max-width: 90%;
            max-height: 90%;
            border-radius: 10px;
        }

        .close-modal {
            position: absolute;
            top: 20px;
            right: 40px;
            color: white;
            font-size: 40px;
            font-weight: bold;
            cursor: pointer;
        }

        .status-message {
            margin-top: 15px;
            padding: 15px;
            border-radius: 10px;
            text-align: center;
            font-weight: 600;
        }

        .status-message.success {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }

        .status-message.error {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }

        .status-message.info {
            background: #d1ecf1;
            color: #0c5460;
            border: 1px solid #bee5eb;
        }

        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: #6c757d;
        }

        .empty-state svg {
            width: 100px;
            height: 100px;
            margin-bottom: 20px;
            opacity: 0.5;
        }

        .button-group {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }

        @media (max-width: 768px) {
            .controls {
                flex-direction: column;
            }

            table {
                font-size: 12px;
            }

            th, td {
                padding: 10px 5px;
            }

            .button-group {
                flex-direction: column;
            }

            .button-group .btn {
                width: 100%;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>📊 Admin - Laporan Serah Terima Obat</h1>
            <p>Kelola dan kirim laporan per shift</p>
        </div>

        <div class="content">
            <div class="controls">
                <div class="control-group">
                    <label for="filterDate">Tanggal</label>
                    <input type="date" id="filterDate">
                </div>
                <div class="control-group">
                    <label for="filterShift">Shift</label>
                    <select id="filterShift">
                        <option value="">Semua Shift</option>
                        <option value="pagi">Pagi (07:00 - 14:00)</option>
                        <option value="siang">Siang (14:00 - 21:00)</option>
                        <option value="malam">Malam (21:00 - 07:00)</option>
                    </select>
                </div>
                <div class="control-group" style="display: flex; align-items: flex-end;">
                    <button class="btn btn-primary" id="loadBtn" style="width: 100%;">🔍 Muat Data</button>
                </div>
            </div>

            <div class="button-group" id="actionButtons" style="display: none; margin-bottom: 20px;">
                <button class="btn btn-success" id="downloadExcelBtn">📥 Download Excel</button>
                <button class="btn btn-danger" id="clearDataBtn">🗑️ Hapus Data Shift Ini</button>
            </div>

            <div class="stats" id="statsContainer" style="display: none;">
                <div class="stat-card">
                    <h3 id="totalRecords">0</h3>
                    <p>Total Data</p>
                </div>
                <div class="stat-card">
                    <h3 id="totalPatients">0</h3>
                    <p>Total Pasien</p>
                </div>
            </div>

            <div class="data-table">
                <div id="emptyState" class="empty-state">
                    <svg viewBox="0 0 24 24" fill="currentColor">
                        <path d="M19 3H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zM9 17H7v-7h2v7zm4 0h-2V7h2v10zm4 0h-2v-4h2v4z"/>
                    </svg>
                    <h3>Belum Ada Data</h3>
                    <p>Pilih tanggal dan shift, lalu klik "Muat Data"</p>
                </div>

                <table id="dataTable" style="display: none;">
                    <thead>
                        <tr>
                            <th>No</th>
                            <th>Waktu</th>
                            <th>Shift</th>
                            <th>Nama Pasien</th>
                            <th>URN</th>
                            <th>Lantai</th>
                            <th>Obat</th>
                            <th>Foto</th>
                        </tr>
                    </thead>
                    <tbody id="tableBody"></tbody>
                </table>
            </div>

            <div class="status-message" id="statusMessage" style="display: none;"></div>
        </div>
    </div>

    <div class="modal" id="photoModal">
        <span class="close-modal" id="closeModal">&times;</span>
        <img class="modal-content" id="modalImage">
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script>
        let currentData = [];
        let currentStorageKey = '';

        // Set tanggal hari ini
        const today = new Date();
        const year = today.getFullYear();
        const month = String(today.getMonth() + 1).padStart(2, '0');
        const day = String(today.getDate()).padStart(2, '0');
        document.getElementById('filterDate').value = year + '-' + month + '-' + day;

        // Event listeners
        document.getElementById('loadBtn').addEventListener('click', loadData);
        document.getElementById('downloadExcelBtn').addEventListener('click', downloadExcel);
        document.getElementById('clearDataBtn').addEventListener('click', clearData);
        document.getElementById('closeModal').addEventListener('click', function() {
            document.getElementById('photoModal').classList.remove('active');
        });

        // Fungsi untuk load data
        function loadData() {
            const date = document.getElementById('filterDate').value;
            const shift = document.getElementById('filterShift').value;

            if (!date) {
                showMessage('Pilih tanggal terlebih dahulu!', 'error');
                return;
            }

            const loadBtn = document.getElementById('loadBtn');
            loadBtn.disabled = true;
            loadBtn.textContent = '⏳ Memuat...';

            try {
                let allData = [];

                if (shift) {
                    // Load data untuk shift tertentu
                    currentStorageKey = 'handover_data_' + date + '_' + shift;
                    const stored = localStorage.getItem(currentStorageKey);
                    if (stored) {
                        try {
                            allData = JSON.parse(stored);
                        } catch (e) {
                            allData = [];
                        }
                    }
                } else {
                    // Load semua shift
                    const shifts = ['pagi', 'siang', 'malam'];
                    for (let i = 0; i < shifts.length; i++) {
                        const key = 'handover_data_' + date + '_' + shifts[i];
                        const stored = localStorage.getItem(key);
                        if (stored) {
                            try {
                                const shiftData = JSON.parse(stored);
                                allData = allData.concat(shiftData);
                            } catch (e) {
                                // Skip jika error
                            }
                        }
                    }
                    currentStorageKey = '';
                }

                currentData = allData;
                displayData(allData);
                updateStats(allData);

                if (allData.length > 0) {
                    document.getElementById('actionButtons').style.display = 'flex';
                    showMessage('✅ Berhasil memuat ' + allData.length + ' data', 'success');
                } else {
                    document.getElementById('actionButtons').style.display = 'none';
                    showMessage('ℹ️ Tidak ada data untuk tanggal dan shift yang dipilih', 'info');
                }

            } catch (error) {
                showMessage('❌ Gagal memuat data: ' + error.message, 'error');
            }

            loadBtn.disabled = false;
            loadBtn.textContent = '🔍 Muat Data';
        }

        // Fungsi untuk menampilkan data
        function displayData(data) {
            const tableBody = document.getElementById('tableBody');
            const emptyState = document.getElementById('emptyState');
            const dataTable = document.getElementById('dataTable');

            if (data.length === 0) {
                emptyState.style.display = 'block';
                dataTable.style.display = 'none';
                return;
            }

            emptyState.style.display = 'none';
            dataTable.style.display = 'table';
            tableBody.innerHTML = '';

            for (let i = 0; i < data.length; i++) {
                const item = data[i];
                const row = document.createElement('tr');
                const date = new Date(item.timestamp);
                
                row.innerHTML = '<td>' + (i + 1) + '</td>' +
                    '<td>' + date.toLocaleString('id-ID') + '</td>' +
                    '<td>' + item.shift + '</td>' +
                    '<td>' + item.namaPasien + '</td>' +
                    '<td>' + item.urnPasien + '</td>' +
                    '<td>' + item.lantai + '</td>' +
                    '<td style="max-width: 200px; white-space: pre-wrap;">' + item.namaObat + '</td>' +
                    '<td><img src="' + item.foto + '" class="photo-preview" onclick="showPhoto(\'' + item.foto + '\')"></td>';
                
                tableBody.appendChild(row);
            }
        }

        // Fungsi untuk update statistik
        function updateStats(data) {
            const statsContainer = document.getElementById('statsContainer');
            
            if (data.length > 0) {
                statsContainer.style.display = 'grid';
                document.getElementById('totalRecords').textContent = data.length;
                
                // Hitung unique patients
                const uniqueUrns = [];
                for (let i = 0; i < data.length; i++) {
                    if (uniqueUrns.indexOf(data[i].urnPasien) === -1) {
                        uniqueUrns.push(data[i].urnPasien);
                    }
                }
                document.getElementById('totalPatients').textContent = uniqueUrns.length;
            } else {
                statsContainer.style.display = 'none';
            }
        }

        // Fungsi untuk menampilkan foto
        function showPhoto(src) {
            document.getElementById('modalImage').src = src;
            document.getElementById('photoModal').classList.add('active');
        }

        // Fungsi download Excel
        function downloadExcel() {
            if (currentData.length === 0) {
                showMessage('Tidak ada data untuk didownload!', 'error');
                return;
            }

            try {
                const excelData = [];
                
                for (let i = 0; i < currentData.length; i++) {
                    const item = currentData[i];
                    excelData.push({
                        'No': i + 1,
                        'Waktu': new Date(item.timestamp).toLocaleString('id-ID'),
                        'Shift': item.shift,
                        'Nama Pasien': item.namaPasien,
                        'URN': item.urnPasien,
                        'Lantai': item.lantai,
                        'Nama Obat': item.namaObat
                    });
                }

                const wb = XLSX.utils.book_new();
                const ws = XLSX.utils.json_to_sheet(excelData);
                
                ws['!cols'] = [
                    {wch: 5}, {wch: 20}, {wch: 25}, {wch: 25}, 
                    {wch: 15}, {wch: 25}, {wch: 40}
                ];
                
                XLSX.utils.book_append_sheet(wb, ws, "Laporan");

                const date = document.getElementById('filterDate').value;
                const shift = document.getElementById('filterShift').value;
                const fileName = 'Laporan_Serah_Terima_Obat_' + date + '_' + (shift || 'semua') + '.xlsx';
                
                XLSX.writeFile(wb, fileName);

                showMessage('✅ File Excel berhasil didownload! Silakan kirim ke: steamrayhan28@gmail.com', 'success');

            } catch (error) {
                showMessage('❌ Gagal download file: ' + error.message, 'error');
            }
        }

        // Fungsi hapus data
        function clearData() {
            if (currentData.length === 0) {
                showMessage('Tidak ada data untuk dihapus!', 'error');
                return;
            }

            if (!currentStorageKey) {
                showMessage('Harap pilih shift spesifik untuk menghapus data!', 'error');
                return;
            }

            if (confirm('⚠️ Apakah Anda yakin ingin menghapus semua data shift ini? Tindakan ini tidak dapat dibatalkan!')) {
                try {
                    localStorage.removeItem(currentStorageKey);
                    currentData = [];
                    displayData([]);
                    updateStats([]);
                    document.getElementById('actionButtons').style.display = 'none';
                    showMessage('✅ Data berhasil dihapus!', 'success');
                } catch (error) {
                    showMessage('❌ Gagal menghapus data: ' + error.message, 'error');
                }
            }
        }

        // Fungsi untuk menampilkan pesan
        function showMessage(message, type) {
            const statusMsg = document.getElementById('statusMessage');
            statusMsg.textContent = message;
            statusMsg.className = 'status-message ' + type;
            statusMsg.style.display = 'block';
            
            setTimeout(function() {
                statusMsg.style.display = 'none';
            }, 5000);
        }

        // Auto-load saat halaman dibuka
        window.addEventListener('load', function() {
            loadData();
        });
    </script>
</body>
</html>
