<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Form Serah Terima Obat</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 600px;
            margin: 0 auto;
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            overflow: hidden;
        }

        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 30px 20px;
            text-align: center;
        }

        .header h1 {
            font-size: 24px;
            margin-bottom: 10px;
        }

        .header p {
            font-size: 14px;
            opacity: 0.9;
        }

        .form-container {
            padding: 30px 20px;
        }

        .form-group {
            margin-bottom: 25px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            color: #333;
            font-weight: 600;
            font-size: 14px;
        }

        input[type="text"],
        select,
        textarea {
            width: 100%;
            padding: 12px 15px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-size: 14px;
            transition: all 0.3s;
            font-family: inherit;
        }

        input[type="text"]:focus,
        select:focus,
        textarea:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        textarea {
            resize: vertical;
            min-height: 100px;
        }

        .camera-container {
            margin-top: 10px;
        }

        .camera-btn {
            width: 100%;
            padding: 15px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .camera-btn:hover {
            background: #5568d3;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.3);
        }

        .camera-btn:active {
            transform: translateY(0);
        }

        .preview-container {
            margin-top: 15px;
            display: none;
        }

        .preview-image {
            width: 100%;
            max-height: 300px;
            object-fit: contain;
            border-radius: 10px;
            border: 2px solid #e0e0e0;
        }

        .remove-photo {
            margin-top: 10px;
            padding: 10px;
            background: #ff4757;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            width: 100%;
            font-size: 14px;
            font-weight: 600;
        }

        .submit-btn {
            width: 100%;
            padding: 18px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 18px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s;
            margin-top: 10px;
        }

        .submit-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(102, 126, 234, 0.4);
        }

        .submit-btn:active {
            transform: translateY(0);
        }

        .submit-btn:disabled {
            background: #ccc;
            cursor: not-allowed;
            transform: none;
        }

        .status-message {
            margin-top: 15px;
            padding: 15px;
            border-radius: 10px;
            text-align: center;
            font-weight: 600;
            display: none;
        }

        .status-message.success {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }

        .status-message.error {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }

        .shift-info {
            background: #f8f9fa;
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 25px;
            border-left: 4px solid #667eea;
        }

        .shift-info p {
            margin: 5px 0;
            font-size: 14px;
            color: #555;
        }

        .shift-info strong {
            color: #333;
        }

        input[type="file"] {
            display: none;
        }

        @media (max-width: 480px) {
            .container {
                border-radius: 0;
            }
            
            .header h1 {
                font-size: 20px;
            }
            
            .form-container {
                padding: 20px 15px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>📋 Form Serah Terima Obat</h1>
            <p>Silakan lengkapi data dengan benar</p>
        </div>

        <div class="form-container">
            <div class="shift-info">
                <p><strong>Shift:</strong> <span id="currentShift"></span></p>
                <p><strong>Tanggal:</strong> <span id="currentDate"></span></p>
                <p><strong>Waktu:</strong> <span id="currentTime"></span></p>
            </div>

            <form id="handoverForm">
                <div class="form-group">
                    <label for="namaPasien">Nama Pasien *</label>
                    <input type="text" id="namaPasien" name="namaPasien" required>
                </div>

                <div class="form-group">
                    <label for="urnPasien">URN Pasien *</label>
                    <input type="text" id="urnPasien" name="urnPasien" required>
                </div>

                <div class="form-group">
                    <label for="lantai">Lantai Rawat Inap *</label>
                    <select id="lantai" name="lantai" required>
                        <option value="">-- Pilih Lantai --</option>
                        <option value="9 General Ward">9 General Ward</option>
                        <option value="9 Obstetry Ward">9 Obstetry Ward</option>
                        <option value="9 General C">9 General C</option>
                        <option value="10 Pediatric Ward">10 Pediatric Ward</option>
                        <option value="11 BMT">11 BMT</option>
                        <option value="11 General Ward">11 General Ward</option>
                        <option value="12 Paliatif Ward">12 Paliatif Ward</option>
                        <option value="16 General Ward">16 General Ward</option>
                        <option value="19 General Ward Wing A">19 General Ward Wing A</option>
                        <option value="19 General Ward Wing B">19 General Ward Wing B</option>
                        <option value="20 General Ward Wing A">20 General Ward Wing A</option>
                        <option value="20 General Ward Wing B">20 General Ward Wing B</option>
                        <option value="22 General Ward Wing A">22 General Ward Wing A</option>
                        <option value="22 General Ward Wing B">22 General Ward Wing B</option>
                        <option value="ICU">ICU</option>
                        <option value="HCU">HCU</option>
                    </select>
                </div>

                <div class="form-group">
                    <label for="namaObat">Nama Obat *</label>
                    <textarea id="namaObat" name="namaObat" required placeholder="Masukkan nama obat (bisa lebih dari satu)"></textarea>
                </div>

                <div class="form-group">
                    <label>Foto Tanda Terima *</label>
                    <input type="file" id="photoInput" accept="image/*" capture="environment">
                    <button type="button" class="camera-btn" id="cameraBtn">
                        📷 Ambil Foto Tanda Terima
                    </button>
                    <div class="camera-container">
                        <div class="preview-container" id="previewContainer">
                            <img id="previewImage" class="preview-image" alt="Preview">
                            <button type="button" class="remove-photo" id="removePhoto">🗑️ Hapus Foto</button>
                        </div>
                    </div>
                </div>

                <button type="submit" class="submit-btn" id="submitBtn">
                    ✅ Kirim Data
                </button>

                <div class="status-message" id="statusMessage"></div>
            </form>
        </div>
    </div>

    <script>
        // Global variable untuk foto
        let photoData = null;
        let currentShift = '';

        // Fungsi untuk mendapatkan shift saat ini
        function getShift() {
            const hour = new Date().getHours();
            if (hour >= 7 && hour < 14) return 'Pagi (07:00 - 14:00)';
            if (hour >= 14 && hour < 21) return 'Siang (14:00 - 21:00)';
            return 'Malam (21:00 - 07:00)';
        }

        // Update tanggal dan waktu
        function updateDateTime() {
            const now = new Date();
            currentShift = getShift();
            
            document.getElementById('currentShift').textContent = currentShift;
            document.getElementById('currentDate').textContent = now.toLocaleDateString('id-ID', {
                weekday: 'long',
                year: 'numeric',
                month: 'long',
                day: 'numeric'
            });
            document.getElementById('currentTime').textContent = now.toLocaleTimeString('id-ID');
        }

        // Jalankan update pertama kali
        updateDateTime();
        // Update setiap detik
        setInterval(updateDateTime, 1000);

        // Tombol kamera
        document.getElementById('cameraBtn').addEventListener('click', function() {
            document.getElementById('photoInput').click();
        });

        // Saat foto dipilih
        document.getElementById('photoInput').addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = function(event) {
                    photoData = event.target.result;
                    document.getElementById('previewImage').src = photoData;
                    document.getElementById('previewContainer').style.display = 'block';
                };
                reader.readAsDataURL(file);
            }
        });

        // Hapus foto
        document.getElementById('removePhoto').addEventListener('click', function() {
            photoData = null;
            document.getElementById('photoInput').value = '';
            document.getElementById('previewContainer').style.display = 'none';
        });

        // Submit form
        document.getElementById('handoverForm').addEventListener('submit', function(e) {
            e.preventDefault();

            // Validasi foto
            if (!photoData) {
                showMessage('Harap ambil foto tanda terima terlebih dahulu!', 'error');
                return;
            }

            const submitBtn = document.getElementById('submitBtn');
            submitBtn.disabled = true;
            submitBtn.textContent = '⏳ Mengirim...';

            // Siapkan data
            const formData = {
                timestamp: new Date().toISOString(),
                shift: currentShift,
                namaPasien: document.getElementById('namaPasien').value,
                urnPasien: document.getElementById('urnPasien').value,
                lantai: document.getElementById('lantai').value,
                namaObat: document.getElementById('namaObat').value,
                foto: photoData
            };

            try {
                // Simpan ke localStorage
                const storageKey = 'handover_data_' + getShiftKey();
                
                // Ambil data yang sudah ada
                let existingData = [];
                const stored = localStorage.getItem(storageKey);
                if (stored) {
                    try {
                        existingData = JSON.parse(stored);
                    } catch (e) {
                        existingData = [];
                    }
                }
                
                // Tambahkan data baru
                existingData.push(formData);
                
                // Simpan kembali
                localStorage.setItem(storageKey, JSON.stringify(existingData));

                showMessage('✅ Data berhasil disimpan! Form akan direset dalam 2 detik.', 'success');
                
                // Reset form setelah 2 detik
                setTimeout(function() {
                    document.getElementById('handoverForm').reset();
                    photoData = null;
                    document.getElementById('previewContainer').style.display = 'none';
                    document.getElementById('statusMessage').style.display = 'none';
                    submitBtn.disabled = false;
                    submitBtn.textContent = '✅ Kirim Data';
                }, 2000);

            } catch (error) {
                showMessage('❌ Gagal menyimpan data: ' + error.message, 'error');
                submitBtn.disabled = false;
                submitBtn.textContent = '✅ Kirim Data';
            }
        });

        // Fungsi untuk mendapatkan key storage
        function getShiftKey() {
            const now = new Date();
            const year = now.getFullYear();
            const month = String(now.getMonth() + 1).padStart(2, '0');
            const day = String(now.getDate()).padStart(2, '0');
            const dateStr = year + '-' + month + '-' + day;
            
            const hour = now.getHours();
            let shiftCode = '';
            
            if (hour >= 7 && hour < 14) {
                shiftCode = 'pagi';
            } else if (hour >= 14 && hour < 21) {
                shiftCode = 'siang';
            } else {
                shiftCode = 'malam';
            }
            
            return dateStr + '_' + shiftCode;
        }

        // Fungsi untuk menampilkan pesan
        function showMessage(message, type) {
            const statusMsg = document.getElementById('statusMessage');
            statusMsg.textContent = message;
            statusMsg.className = 'status-message ' + type;
            statusMsg.style.display = 'block';
        }
    </script>
</body>
</html>
