<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Form Serah Terima Obat</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

<style>
body{font-family:sans-serif;background:linear-gradient(135deg,#667eea,#764ba2);padding:20px;}
.container{background:white;padding:20px;border-radius:15px;max-width:500px;margin:auto;}
input,textarea,select{width:100%;margin:10px 0;padding:10px;border-radius:8px;border:1px solid #ccc;}
button{width:100%;padding:15px;background:#667eea;color:white;border:none;border-radius:10px;font-weight:bold;}
img{width:100px;margin:5px;border-radius:8px;}
</style>
</head>

<body>
<div class="container">
<h2>📋 Form Serah Terima Obat</h2>

<input id="pengirim" placeholder="Nama Pengirim" required>
<input id="penerima" placeholder="Nama Penerima" required>

<input id="namaPasien" placeholder="Nama Pasien" required>
<input id="urnPasien" placeholder="URN Pasien" required>

<select id="lantai" required>
<option value="">-- Pilih Lantai Rawat Inap --</option>

<optgroup label="Lantai 9">
<option value="9 General Ward">9 General Ward</option>
<option value="9 Obstetry Ward">9 Obstetry Ward</option>
<option value="9 General C">9 General C</option>
</optgroup>

<optgroup label="Lantai 10">
<option value="10 Pediatric Ward">10 Pediatric Ward</option>
</optgroup>

<optgroup label="Lantai 11">
<option value="11 BMT">11 BMT</option>
<option value="11 General Ward">11 General Ward</option>
</optgroup>

<optgroup label="Lantai 12">
<option value="12 Paliatif Ward">12 Paliatif Ward</option>
</optgroup>

<optgroup label="Lantai 16">
<option value="16 General Ward">16 General Ward</option>
</optgroup>

<optgroup label="Lantai 19">
<option value="19 General Ward Wing A">19 General Ward Wing A</option>
<option value="19 General Ward Wing B">19 General Ward Wing B</option>
</optgroup>

<optgroup label="Lantai 20">
<option value="20 General Ward Wing A">20 General Ward Wing A</option>
<option value="20 General Ward Wing B">20 General Ward Wing B</option>
</optgroup>

<optgroup label="Lantai 22">
<option value="22 General Ward Wing A">22 General Ward Wing A</option>
<option value="22 General Ward Wing B">22 General Ward Wing B</option>
</optgroup>

<optgroup label="Khusus">
<option value="ICU">ICU</option>
<option value="HCU">HCU</option>
</optgroup>

</select>

<textarea id="namaObat" placeholder="Nama Obat"></textarea>

<input type="file" id="photoInput" multiple accept="image/*">
<div id="preview"></div>

<button onclick="submitData()">Kirim Data</button>
</div>

<script>
const supabase = window.supabase.createClient(
  'https://wgxtnhgjrkgigyqhnlwy.supabase.co',
   'sb_publishable_XXXX'
);

let files = [];

photoInput.onchange = e=>{
  files = e.target.files;
  preview.innerHTML = "";

  [...files].forEach(file=>{
    const reader = new FileReader();
    reader.onload = e=>{
      preview.innerHTML += `<img src="${e.target.result}">`;
    };
    reader.readAsDataURL(file);
  });
};

function getShift(){
  const h = new Date().getHours();
  if(h<14) return "pagi";
  if(h<21) return "siang";
  return "malam";
}

async function submitData(){
  if(files.length===0) return alert("Foto wajib!");

  try{
    let urls = [];

    for(let file of files){
      const fileName = Date.now()+"_"+file.name;

      await supabase.storage.from('handover')
        .upload(fileName, file);

      const { data } = supabase.storage
        .from('handover')
        .getPublicUrl(fileName);

      urls.push(data.publicUrl);
    }

    await supabase.from('handover_data').insert([{
      timestamp: new Date(),
      shift: getShift(),
      pengirim: pengirim.value,
      penerima: penerima.value,
      nama_pasien: namaPasien.value,
      urn_pasien: urnPasien.value,
      lantai: lantai.value,
      nama_obat: namaObat.value,
      foto_url: urls.join(",")
    }]);

    alert("✅ Data berhasil dikirim!");
    location.reload();

  }catch(err){
    alert("❌ Error: " + err.message);
  }
}
</script>

</body>
</html>
