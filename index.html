<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Form Serah Terima</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

<style>
body{
  font-family:'Segoe UI';
  background:linear-gradient(135deg,#1e1e2f,#2c2c54);
  color:white;
  padding:20px;
}

.container{
  background:#2a2a40;
  padding:20px;
  border-radius:12px;
  max-width:500px;
  margin:auto;
  box-shadow:0 0 20px rgba(0,0,0,0.4);
}

input,select,textarea{
  width:100%;
  padding:10px;
  margin:10px 0;
  border:none;
  border-radius:8px;
  background:#1e1e2f;
  color:white;
}

button{
  width:100%;
  padding:12px;
  background:#5c6bc0;
  border:none;
  border-radius:8px;
  color:white;
  font-weight:bold;
}

img{width:80px;margin:5px;border-radius:6px;}
</style>
</head>

<body>

<div class="container">
<h2>📋 Form Serah Terima</h2>

<input id="pengirim" placeholder="Nama Pengirim">
<input id="penerima" placeholder="Nama Penerima">

<input id="namaPasien" placeholder="Nama Pasien">
<input id="urnPasien" placeholder="URN Pasien">

<select id="lantai">
<option value="">Pilih Lantai</option>
<option>ICU</option>
<option>HCU</option>
<option>Ward</option>
</select>

<textarea id="namaObat" placeholder="Nama Obat"></textarea>

<input type="file" id="photoInput" multiple>
<div id="preview"></div>

<button onclick="submitData()">Kirim Data</button>
</div>

<script>
const supabase = window.supabase.createClient(
  'https://wgxtnhgjrkgigyqhnlwy.supabase.co',
  'sb_publishable_xxxxx'
);

let files = [];

photoInput.onchange = e=>{
  files = e.target.files;
  preview.innerHTML="";
  [...files].forEach(file=>{
    const reader=new FileReader();
    reader.onload=e=>{
      preview.innerHTML+=`<img src="${e.target.result}">`;
    };
    reader.readAsDataURL(file);
  });
};

function getShift(){
  let h=new Date().getHours();
  if(h<14)return"pagi";
  if(h<21)return"siang";
  return"malam";
}

async function submitData(){
  try{
    if(files.length===0) return alert("Upload foto dulu!");

    let urls=[];

    for(let file of files){
      let name=Date.now()+"_"+file.name;

      let {error}=await supabase.storage
      .from('handover')
      .upload(name,file);

      if(error) throw error;

      let {data}=supabase.storage
      .from('handover')
      .getPublicUrl(name);

      urls.push(data.publicUrl);
    }

    let {error}=await supabase
    .from('handover_data')
    .insert([{
      timestamp:new Date(),
      shift:getShift(),
      pengirim:pengirim.value,
      penerima:penerima.value,
      nama_pasien:namaPasien.value,
      urn_pasien:urnPasien.value,
      lantai:lantai.value,
      nama_obat:namaObat.value,
      foto_url:urls.join(",")
    }]);

    if(error) throw error;

    alert("Berhasil!");
    location.reload();

  }catch(err){
    alert("ERROR: "+err.message);
  }
}
</script>

</body>
</html>
